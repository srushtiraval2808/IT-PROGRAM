<!DOCTYPE html>
<html>
<head>
    <style>
        /* This CSS makes the table visible and readable */
        table {
            width: 50%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h2>Student Information Table</h2>

    <table>
        <tr>
            <th>Student Name</th>
            <th>City</th>
        </tr>
        <tr>
            <td>Sunny Sharma</td>
            <td>Rajkot</td>
        </tr>
        <tr>
            <td>Ravi Verma</td>
            <td>Mumbai</td>
        </tr>
    </table>

</body>
</html>
