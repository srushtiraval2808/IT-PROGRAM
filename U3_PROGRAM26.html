<!DOCTYPE html>
<html>
<head>
    <style>
        table {
            width: 60%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }
        td {
            border: 1px solid #000;
            padding: 8px;
            text-align: center;
        }
        /* Styling the top 'caption' row */
        .caption-row {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td colspan="2" class="caption-row">This is a caption</td>
        </tr>
        <tr>
            <td>row 1, column 1</td>
            <td>row 1, column 2</td>
        </tr>
        <tr>
            <td>row 2, column 1</td>
            <td>row 2, column 2</td>
        </tr>
    </table>

</body>
</html>
