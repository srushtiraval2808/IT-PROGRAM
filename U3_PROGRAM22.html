<!DOCTYPE html>
<html>
<head>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #333;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        /* Highlight the Total column */
        td:last-child {
            font-weight: bold;
            background-color: #fffde7;
        }
    </style>
</head>
<body>

    <h2>Student Marks Record</h2>

    <table>
        <thead>
            <tr>
                <th>Sr No</th>
                <th>Student Name</th>
                <th>Sub Marks-1</th>
                <th>Sub Marks-2</th>
                <th>Sub Marks-3</th>
                <th>Sub Marks-4</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Sunny Sharma</td>
                <td>85</td>
                <td>90</td>
                <td>78</td>
                <td>88</td>
                <td>341</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Ravi Verma</td>
                <td>70</td>
                <td>65</td>
                <td>82</td>
                <td>75</td>
                <td>292</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
