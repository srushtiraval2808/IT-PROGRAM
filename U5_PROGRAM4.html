<!DOCTYPE html>
<html>
<body>

<h3>JavaScript Loops Example</h3>

<script>
    // 1. For Loop
    document.write("<b>For Loop:</b><br>");
    for(let i = 1; i <= 3; i++) {
        document.write(i + "<br>");
    }

    // 2. While Loop
    document.write("<br><b>While Loop:</b><br>");
    let j = 1;
    while(j <= 3) {
        document.write(j + "<br>");
        j++;
    }

    // 3. Do-While Loop
    document.write("<br><b>Do-While Loop:</b><br>");
    let k = 1;
    do {
        document.write(k + "<br>");
        k++;
    } while(k <= 3);
</script>

</body>
</html>
