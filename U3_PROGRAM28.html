<!DOCTYPE html>
<html>
<head>
    <style>
        table {
            border-collapse: collapse;
            margin: 20px auto;
        }
        td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }
        /* Styling the thumbnails */
        .thumb {
            width: 150px; /* Adjust size as needed */
            height: 100px;
            object-fit: cover; /* Keeps the aspect ratio clean */
            display: block;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Image Thumbnail Gallery (4x2 Table)</h2>

    <table>
        <tr>
            <td><img src="car2.jpg" class="thumb" alt="Mountain 1"></td>
            <td><img src="car3.jpg" class="thumb" alt="Mountain 2"></td>
            <td><img src="car4.jpg" class="thumb" alt="Mountain 3"></td>
            <td><img src="car5.jpg" class="thumb" alt="Mountain 4"></td>
        </tr>
        <tr>
            <td><img src="car6.jpg" class="thumb" alt="Mountain 5"></td>
            <td><img src="car7.jpg" class="thumb" alt="Mountain 6"></td>
            <td><img src="car8.jpg" class="thumb" alt="Mountain 7"></td>
            <td><img src="car9.jpg" class="thumb" alt="Mountain 8"></td>
        </tr>
    </table>

</body>
</html>
