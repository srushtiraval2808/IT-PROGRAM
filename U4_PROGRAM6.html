<!DOCTYPE html>
<html>
<head>
<style>
td {
  width:100px; height:50px; text-align:center;
}
.red:hover { background:red; }
.blue:hover { background:blue; }
.green:hover { background:green; }
</style>
</head>
<body>
<table border="1">
<tr>
<td class="red">Red</td>
<td class="blue">Blue</td>
<td class="green">Green</td>
</tr>
<tr>
<td class="green">Green</td>
<td class="red">Red</td>
<td class="blue">Blue</td>
</tr>
<tr>
<td class="blue">Blue</td>
<td class="green">Green</td>
<td class="red">Red</td>
</tr>
</table>
</body>
</html>
