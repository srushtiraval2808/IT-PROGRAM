<!DOCTYPE html>
<html>
<head>
    <style>
        /* General styling for visibility */
        table {
            border-collapse: collapse;
            margin: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 15px;
            text-align: center;
        }
        /* Styling for the nested inner tables */
        .inner-table td {
            padding: 8px 15px;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td>
                <table class="inner-table">
                    <tr><td>1</td><td>2</td></tr>
                    <tr><td>3</td><td>4</td></tr>
                    <tr><td>5</td><td>6</td></tr>
                </table>
            </td>
            <td>

                    <tr><td>1</td><td>2</td></tr>
                    <tr><td>3</td><td>4</td></tr>

                </table>
            </td>
        </tr>

                </table>
            </td>
            <td>

                </table>
            </td>
        </tr>
    </table>

</body>
</html>
