<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ex 30 - Home Layout Table</title>
    <style>
        table {
            width: 800px;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            text-align: center;
            font-weight: bold;
            border: 2px solid blue;
        }
        td {
            border: 2px solid blue;
            height: 50px;
            padding: 5px;
        }
        /* Row Heights for the larger center area */
        .large-row { height: 150px; }
        
        /* Specific Colors */
        .in { background-color: #99cc00; }
        .entry { background-color: white; }
        .parking { background-color: black; color: white; }
        .gym { background-color: #993300; color: white; }
        .library { background-color: yellow; }
        .computer { background-color: yellow; }
        .music { background-color: #999999; }
        .dance { background-color: #999999; color: white; }
        .home { background-color: #ffcc00; }
        .bedroom { background-color: #00ccff; }
        .master { background-color: #cc3399; color: white; }
        .wash { background-color: #cc3399; color: white; }
        .balcony { background-color: #ccffff; }
        .drawing { background-color: #00ff00; }
        .dining { background-color: #cc9933; color: white; }
        .kitchen { background-color: #cc9933; color: white; }
        .play { background-color: #666699; color: white; }
        .store { background-color: #cccccc; }
        .out { background-color: red; color: white; }
    </style>
</head>
<body>

    <table>
        <tr>
            <td colspan="2" class="in">In</td>
            <td class="entry">Entry</td>
            <td class="parking">Parking</td>
        </tr>

        <tr>
            <td rowspan="2" class="gym" width="20%">Gym</td>
            <td class="library">Library Room</td>
            <td rowspan="4" class="home" width="30%">Home</td>
            <td class="balcony">Balcony</td>
        </tr>
        <tr>
            <td class="computer">Computer Room</td>
            <td class="drawing">Drawing Room</td>
        </tr>

        <tr>
            <td class="music">Music Room</td>
            <td class="dance">Dance Floor</td>
            <td>
                <table style="width:100%; height:100%; border:none;">
                    <tr>
                        <td class="dining" style="border:none; border-right:2px solid blue;">Dining Area</td>
                        <td class="kitchen" style="border:none;">Kitchen</td>
                    </tr>
                </table>
            </td>
        </tr>

        <tr>
            <td colspan="2" class="bedroom">Bedroom</td>
            <td class="play">Play Room</td>
        </tr>

        <tr>
            <td class="master">Master Bedroom</td>
            <td class="wash">Wash Area</td>
            <td class="entry">Exit</td>
            <td class="store">Store Room</td>
        </tr>

        <tr>
            <td colspan="3"></td> <td class="out">Out</td>
        </tr>
    </table>

</body>
</html>
