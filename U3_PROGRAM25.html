<!DOCTYPE html>
<html>
<head>
    <style>
        table {
            width: 70%;
            border-collapse: collapse;
            /* Applying background color to the whole table as requested */
            background-color: #f0f8ff; 
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 2px solid #333;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Merging Cells: Colspan and Rowspan</h2>

    <table>
        <tr>
            <th>Column 1</th>
            <th>Column 2</th>
            <th>Column 3</th>
        </tr>

        <tr>
            <td rowspan="2">Row 1<br>Cell 1</td>
            <td>Row 1 Cell 2</td>
            <td>Row 1 Cell 3</td>
        </tr>

        <tr>
            <td>Row 2 Cell 2</td>
            <td>Row 2 Cell 3</td>
        </tr>

        <tr>
            <td colspan="3">Row 3 Cell 1</td>
        </tr>
    </table>

</body>
</html>
