<!DOCTYPE html>
<html>
<head>
    <style>
        table {
            width: 60%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            margin: 20px 0;
        }
        /* Setting the red border color as shown in your image */
        th, td {
            border: 1px solid #d9534f; 
            padding: 10px;
            text-align: center;
        }
        /* Bold headers and side labels */
        .label {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Population Growth (in Billion)</h2>

    <table>
        <tr>
            <th></th> <th class="label">2020</th>
            <th class="label">2021</th>
            <th class="label">2022</th>
        </tr>
        <tr>
            <td class="label">Canada</td>
            <td>1.3</td>
            <td>1.5</td>
            <td>1.8</td>
        </tr>
        <tr>
            <td class="label">London</td>
            <td>0.09</td>
            <td>0.45</td>
            <td>1.1</td>
        </tr>
        <tr>
            <td class="label">Australia</td>
            <td>1.9</td>
            <td>2.2</td>
            <td>2.4</td>
        </tr>
        <tr>
            <td class="label">India</td>
            <td>2.44</td>
            <td>3.21</td>
            <td>3.62</td>
        </tr>
    </table>

</body>
</html>
